<!-- ═══════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html">
            <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
        </a>
        <nav class="icon-nav">
            <a href="#" class="icon-link" aria-label="Search" id="searchBtn">
                <img src="/assets/icons/search_logo.png" alt="Search" />
            </a>
            <a href="wishlist.html" class="icon-link" aria-label="Wishlist">
                <img src="/assets/icons/heart_logo.png" alt="Wishlist" />
            </a>
            <a href="cart.html" class="icon-link" aria-label="Cart">
                <img src="/assets/icons/cart_logo.png" alt="Cart" />
            </a>
            <a href="/account" class="icon-link" aria-label="Account">
                <img src="/assets/icons/person_logo.png" alt="Account" />
            </a>
        </nav>
    </div>

    <div class="search-bar" id="searchBar">
        <div class="search-bar-inner">
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search for products..."
                    autocomplete="off"
            />
            <div class="search-bar-divider"></div>
            <button class="search-close" id="searchClose">Close</button>
        </div>
    </div>
</header>

<script>
    const searchBtn   = document.getElementById('searchBtn');
    const searchBar   = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const searchClose = document.getElementById('searchClose');

    // Open search bar
    searchBtn.addEventListener('click', (e) => {
        e.preventDefault();
        searchBar.classList.add('open');
        searchBtn.classList.add('search-active');
        setTimeout(() => searchInput.focus(), 350); // focus after slide finishes
    });

    // Close via close button
    searchClose.addEventListener('click', () => {
        searchBar.classList.remove('open');
        searchBtn.classList.remove('search-active');
        searchInput.value = '';
    });

    // Close via Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
            searchInput.value = '';
        }
    });

    // Close when clicking outside
    document.addEventListener('click', (e) => {
        if (!searchBar.contains(e.target) && !searchBtn.contains(e.target)) {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
        }
    });
</script>
