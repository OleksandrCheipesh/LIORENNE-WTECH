<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liorenne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/css/variables.css" />
    <link rel="stylesheet" href="/styles/css/base.css" />
    <link rel="stylesheet" href="/styles/css/components.css" />
    <link rel="stylesheet" href="/styles/css/layout.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html">
            <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
        </a>
        <nav class="icon-nav">
            <a href="/search" class="icon-link" aria-label="Search">
                <img src="/assets/icons/search_logo.png" alt="Search" />
            </a>
            <a href="/wishlist" class="icon-link" aria-label="Wishlist">
                <img src="/assets/icons/heart_logo.png" alt="Wishlist" />
            </a>
            <a href="cart.html" class="icon-link" aria-label="Cart">
                <img src="/assets/icons/cart_logo.png" alt="Cart" />
            </a>
            <a href="/account" class="icon-link" aria-label="Account">
                <img src="/assets/icons/person_logo.png" alt="Account" />
            </a>
        </nav>
    </div>
</header>

<!-- ═══════════════════════════════════════
     HERO SECTION
════════════════════════════════════════ -->
<section class="hero">
    <div class="hero-placeholder">
        <img src="/assets/seasonal.png" alt="Spring Collection" />
    </div>
    <div class="hero-content">
        <p class="hero-subtitle">The spring collection</p>
        <a href="/new-arrivals" class="btn-primary">SHOP NEW ARRIVALS</a>
    </div>
</section>

<!-- ═══════════════════════════════════════
     CATEGORY SECTION
════════════════════════════════════════ -->
<section class="category-section">
    <div class="category-image">
        <img src="/assets/seasonal.2.png" alt="Categories" />
    </div>
    <nav class="category-nav">
        <a href="/men" class="category-link">MEN</a>
        <a href="/women" class="category-link">WOMEN</a>
        <a href="/kids-baby" class="category-link">KIDS &amp; BABY</a>
        <a href="/home" class="category-link">HOME</a>
        <a href="/accessories" class="category-link">ACCESSORIES</a>
        <a href="/gifts" class="category-link">GIFTS</a>
    </nav>
</section>

<!-- ═══════════════════════════════════════
     FOOTER
════════════════════════════════════════ -->
<footer class="site-footer">
    <div class="footer-inner">

        <div class="footer-brand">
            <a class="logo" href="/">
                <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
            </a>
        </div>

        <!-- ← wrap all 3 cols in this div -->
        <div class="footer-cols">
            <div class="footer-col">
                <h4 class="footer-heading">SERVICES</h4>
                <ul class="footer-links">
                    <li><a href="/shipping">Shipping</a></li>
                    <li><a href="/returns">Returns</a></li>
                    <li><a href="/promotions">Promotions</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <h4 class="footer-heading">CONTACT</h4>
                <ul class="footer-links">
                    <li><a href="/chat">Chat with us</a></li>
                    <li><a href="/faq">FAQ</a></li>
                    <li><a href="/store-locator">Store Locator</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <h4 class="footer-heading">OUR COMPANY</h4>
                <ul class="footer-links">
                    <li><a href="/careers">Careers</a></li>
                    <li><a href="/investors">Investors</a></li>
                    <li><a href="/press">Press</a></li>
                </ul>
            </div>
        </div>

    </div>
</footer>

</body>
</html>
