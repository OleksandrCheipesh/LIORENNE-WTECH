<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Liorenne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/css/variables.css" />
    <link rel="stylesheet" href="/styles/css/base.css" />
    <link rel="stylesheet" href="/styles/css/components.css" />
    <link rel="stylesheet" href="/styles/css/layout.css" />
    <style>
        body { font-family: 'Libre Bodoni', serif; }
        .checkout-container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .checkout-summary {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(59,130,246, 0.3);
            position: sticky;
            top: 2rem;
        }
        .payment-option {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            justify-content: center;
        }
        .payment-option:hover, .payment-option.active {
            background: rgba(255,255,255,0.25);
            border-color: white;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 1rem 1.25rem;
            font-size: 1.1rem;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.25);
        }
        .required::after {
            content: " *";
            color: #dc3545;
        }

        .summary-row {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            backdrop-filter: blur(10px);
        }

        .order-btn {
            background: rgba(255,255,255,0.15) !important;
            border: 2px solid rgba(255,255,255,0.3) !important;
            color: white !important;
            border-radius: 12px !important;
            padding: 1rem !important;
            backdrop-filter: blur(10px) !important;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5) !important;
        }

        .order-btn:hover {
            background: rgba(255,255,255,0.25) !important;
            transform: translateY(-2px) !important;
        }

    </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html">
            <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
        </a>
        <nav class="icon-nav">
            <a href="/search" class="icon-link" aria-label="Search">
                <img src="/assets/icons/search_logo.png" alt="Search" />
            </a>
            <a href="/wishlist" class="icon-link" aria-label="Wishlist">
                <img src="/assets/icons/heart_logo.png" alt="Wishlist" />
            </a>
            <a href="cart.html" class="icon-link" aria-label="Cart">
                <img src="/assets/icons/cart_logo.png" alt="Cart" />
            </a>
            <a href="/account" class="icon-link" aria-label="Account">
                <img src="/assets/icons/person_logo.png" alt="Account" />
            </a>
        </nav>
    </div>
</header>

<!-- Checkout -->
<div class="checkout-container">
    <div class="row mb-5">
        <div class="col-12">
            <a href="cart.html" class="btn btn-outline-dark btn-lg mb-4 d-inline-flex align-items-center">
                <i class="bi bi-arrow-left me-2"></i> Späť do košíka
            </a>
            <h1 class="text-center fw-bold fs-1 text-dark mb-4">Checkout info</h1>
        </div>
    </div>

    <div class="row g-5">
        <!-- Formular -->
        <div class="col-lg-8">
            <div class="bg-light p-5 rounded-4" style="min-height: 600px;">
                <h2 class="fw-bold fs-2 mb-5 pb-3 border-bottom">Kontaktné informácie</h2>
                
                <form id="checkoutForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Meno</label>
                            <input type="text" class="form-control form-control-lg" id="firstName" placeholder="Jan" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Priezvisko</label>
                            <input type="text" class="form-control form-control-lg" id="lastName" placeholder="Novy" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Email</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="jan.novy@gmail.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Telefón</label>
                            <input type="tel" class="form-control form-control-lg" id="phone" placeholder="0949 188 321" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Štát</label>
                            <input type="text" class="form-control form-control-lg" id="state" placeholder="Slovensko" placeholder="Slovensko" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Ulica</label>
                            <input type="text" class="form-control form-control-lg" id="street" placeholder="Mytna" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">Číslo domu</label>
                            <input type="text" class="form-control form-control-lg" id="streetNumber" placeholder="21" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold fs-5 mb-3 required">PSČ</label>
                            <input type="text" class="form-control form-control-lg" id="zip" placeholder="082 21" required>
                        </div>
                    </div>
                </form>
                <!-- Platobne metody-->
                <div class="mt-5 pt-4 border-top">
                    <h5 class="fw-bold fs-4 mb-4">Spôsob platby</h5>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="form-check payment-option-form active" data-payment="cash">
                                <input class="form-check-input d-none" type="radio" name="payment" value="cash" checked id="cash">
                                <label class="form-check-label w-100 p-3 rounded-3 bg-light border" for="cash">
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-cash-stack fs-4 me-3 text-success"></i>
                                        <div>
                                            <strong>Dobierka</strong><br>
                                            <small class="text-muted">Platba pri doručení</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check payment-option-form" data-payment="card">
                                <input class="form-check-input d-none" type="radio" name="payment" value="card" id="card">
                                <label class="form-check-label w-100 p-3 rounded-3 bg-light border" for="card">
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-credit-card fs-4 me-3 text-primary"></i>
                                        <div>
                                            <strong>Karta</strong><br>
                                            <small class="text-muted">Online platba kartou</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sumar-->
        <div class="col-lg-4">
            <div class="checkout-summary">
                <h3 class="text-center mb-4 fw-bold fs-2">Súhrn objednávky</h3>
                
                <div class="summary-row d-flex justify-content-between align-items-center mb-4 p-3">
                    <span class="fs-6">Produkty</span>
                    <strong class="fs-6">€137.49</strong>
                </div>

                <div class="summary-row d-flex justify-content-between align-items-center mb-4 p-3">
                    <span class="fs-6">Štandardná doprava</span>
                    <strong class="fs-6">€4</strong>
                </div>
                
                <div class="summary-row d-flex justify-content-between align-items-center p-3 mb-4 border-top">
                    <h4 class="mb-0 fw-bold fs-4">Celkom</h4>
                    <h2 class="mb-0 fw-bold fs-2">€141.49</h2>
                </div>

                <button class="btn order-btn w-100 fw-bold fs-6 d-flex align-items-center justify-content-center">
                    <i class="bi bi-check-circle me-2"></i>
                    Potvrdiť objednávku
                </button>
            </div>
        </div>


<!-- Footer -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <a class="logo" href="index.html">
                <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
            </a>
        </div>
        <div class="footer-cols">
            <div class="footer-col">
                <h4 class="footer-heading">SERVICES</h4>
                <ul class="footer-links">
                    <li><a href="/shipping">Shipping</a></li>
                    <li><a href="/returns">Returns</a></li>
                    <li><a href="/promotions">Promotions</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4 class="footer-heading">CONTACT</h4>
                <ul class="footer-links">
                    <li><a href="/chat">Chat with us</a></li>
                    <li><a href="/faq">FAQ</a></li>
                    <li><a href="/store-locator">Store Locator</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4 class="footer-heading">OUR COMPANY</h4>
                <ul class="footer-links">
                    <li><a href="/careers">Careers</a></li>
                    <li><a href="/investors">Investors</a></li>
                    <li><a href="/press">Press</a></li>
                </ul>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
