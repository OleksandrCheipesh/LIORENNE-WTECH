<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Liorenne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/css/variables.css" />
    <link rel="stylesheet" href="/styles/css/base.css" />
    <link rel="stylesheet" href="/styles/css/components.css" />
    <link rel="stylesheet" href="/styles/css/layout.css" />
    <link rel="stylesheet" href="/styles/css/checkout.css" />
    <link rel="stylesheet" href="/styles/css/search.css" />
    <link rel="stylesheet" href="/styles/css/wishlist.css" />
    <link rel="stylesheet" href="/styles/css/auth-panel.css" />


</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html">
            <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
        </a>
        <nav class="icon-nav">
            <a href="#" class="icon-link" aria-label="Search" id="searchBtn">
                <img src="/assets/icons/search_logo.png" alt="Search" />
            </a>
            <a href="wishlist.html" class="icon-link" aria-label="Wishlist">
                <img src="/assets/icons/heart_logo.png" alt="Wishlist" />
            </a>
            <a href="cart.html" class="icon-link" aria-label="Cart">
                <img src="/assets/icons/cart_logo.png" alt="Cart" />
            </a>
            <a href="#" class="icon-link" id="accountBtn" aria-label="Account">
                <img src="/assets/icons/person_logo.png" alt="Account" />
            </a>
        </nav>
    </div>

    <div class="search-bar" id="searchBar">
        <div class="search-bar-inner">
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search for products..."
                    autocomplete="off"
            />
            <div class="search-bar-divider"></div>
            <button class="search-close" id="searchClose">Close</button>
        </div>
    </div>
</header>

<script>
    const searchBtn   = document.getElementById('searchBtn');
    const searchBar   = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const searchClose = document.getElementById('searchClose');

    // Open search bar
    searchBtn.addEventListener('click', (e) => {
        e.preventDefault();
        searchBar.classList.add('open');
        searchBtn.classList.add('search-active');
        setTimeout(() => searchInput.focus(), 350); // focus after slide finishes
    });

    // Close via close button
    searchClose.addEventListener('click', () => {
        searchBar.classList.remove('open');
        searchBtn.classList.remove('search-active');
        searchInput.value = '';
    });

    // Close via Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
            searchInput.value = '';
        }
    });

    // Close when clicking outside
    document.addEventListener('click', (e) => {
        if (!searchBar.contains(e.target) && !searchBtn.contains(e.target)) {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
        }
    });
</script>

<!-- ═══════════════════════════════════════
     CHECKOUT
════════════════════════════════════════ -->
<div class="checkout-container">

    <!-- Back + title -->
    <div class="row mb-5">
        <div class="col-12">
            <a href="cart.html" class="checkout-back d-inline-flex align-items-center mb-4">
                ← Back to Cart
            </a>
            <h1 class="checkout-title text-center">Checkout</h1>
        </div>
    </div>

    <div class="row g-5">

        <!-- ── Form ── -->
        <div class="col-lg-8">
            <div class="checkout-form-box">

                <h2 class="form-section-title">Contact Information</h2>

                <form id="checkoutForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="checkout-label required" for="firstName">First Name</label>
                            <input type="text" class="checkout-input form-control" id="firstName" placeholder="John" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="lastName">Last Name</label>
                            <input type="text" class="checkout-input form-control" id="lastName" placeholder="Smith" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="email">Email</label>
                            <input type="email" class="checkout-input form-control" id="email" placeholder="john.smith@gmail.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="phone">Phone</label>
                            <input type="tel" class="checkout-input form-control" id="phone" placeholder="+1 234 567 890" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="state">Country</label>
                            <input type="text" class="checkout-input form-control" id="state" placeholder="United States" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="street">Street</label>
                            <input type="text" class="checkout-input form-control" id="street" placeholder="Main Street" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="streetNumber">House Number</label>
                            <input type="text" class="checkout-input form-control" id="streetNumber" placeholder="21" required>
                        </div>
                        <div class="col-md-6">
                            <label class="checkout-label required" for="zip">ZIP / Postal Code</label>
                            <input type="text" class="checkout-input form-control" id="zip" placeholder="10001" required>
                        </div>
                    </div>
                </form>

                <!-- Payment methods -->
                <div class="payment-section">
                    <h2 class="form-section-title">Payment Method</h2>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="payment-option active" data-payment="cash">
                                <input class="d-none" type="radio" name="payment" value="cash" checked id="cash">
                                <label for="cash" class="payment-label">
                                    <span class="payment-icon">💵</span>
                                    <div>
                                        <strong>Cash on Delivery</strong>
                                        <small>Pay upon arrival</small>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="payment-option" data-payment="card">
                                <input class="d-none" type="radio" name="payment" value="card" id="card">
                                <label for="card" class="payment-label">
                                    <span class="payment-icon">💳</span>
                                    <div>
                                        <strong>Credit Card</strong>
                                        <small>Secure online payment</small>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ── Order summary ── -->
        <div class="col-lg-4">
            <div class="checkout-summary">

                <h3 class="summary-title">Order Summary</h3>

                <div class="summary-row d-flex justify-content-between align-items-center">
                    <span>Products</span>
                    <strong>€137.49</strong>
                </div>

                <div class="summary-row d-flex justify-content-between align-items-center">
                    <span>Standard Shipping</span>
                    <strong>€4.00</strong>
                </div>

                <div class="summary-total d-flex justify-content-between align-items-center">
                    <h4>Total</h4>
                    <h2>€141.49</h2>
                </div>

                <button class="btn-order w-100 d-flex align-items-center justify-content-center">
                    Confirm Order
                </button>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.payment-option').forEach(option => {
        option.addEventListener('click', () => {
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
            option.classList.add('active');
            option.querySelector('input[type="radio"]').checked = true;
        });
    });
</script>
<script src="auth-panel.js"></script>
