<!-- ═══════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html">
            <img src="/assets/logo.png" alt="Liorenne" class="logo-img" />
        </a>
        <nav class="icon-nav">
            <a href="#" class="icon-link" aria-label="Search" id="searchBtn">
                <img src="/assets/icons/search_logo.png" alt="Search" />
            </a>
            <a href="wishlist.html" class="icon-link" aria-label="Wishlist">
                <img src="/assets/icons/heart_logo.png" alt="Wishlist" />
            </a>
            <a href="cart.html" class="icon-link" aria-label="Cart">
                <img src="/assets/icons/cart_logo.png" alt="Cart" />
            </a>
            <a href="#" class="icon-link" id="accountBtn" aria-label="Account">
                <img src="/assets/icons/person_logo.png" alt="Account" />
            </a>
        </nav>
    </div>

    <div class="search-bar" id="searchBar">
        <div class="search-bar-inner">
            <input type="text" id="searchInput"
                   placeholder="Search for products..." autocomplete="off" />
            <div class="search-bar-divider"></div>
            <button class="search-close" id="searchClose">Close</button>
        </div>
    </div>
</header>

<script>
    const searchBtn   = document.getElementById('searchBtn');
    const searchBar   = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const searchClose = document.getElementById('searchClose');

    searchBtn.addEventListener('click', (e) => {
        e.preventDefault();
        searchBar.classList.add('open');
        searchBtn.classList.add('search-active');
        setTimeout(() => searchInput.focus(), 350);
    });

    searchClose.addEventListener('click', () => {
        searchBar.classList.remove('open');
        searchBtn.classList.remove('search-active');
        searchInput.value = '';
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
            searchInput.value = '';
        }
    });

    document.addEventListener('click', (e) => {
        if (!searchBar.contains(e.target) && !searchBtn.contains(e.target)) {
            searchBar.classList.remove('open');
            searchBtn.classList.remove('search-active');
        }
    });
</script>

<!-- ═══════════════════════════════════════
     PRODUCT DETAIL
════════════════════════════════════════ -->
<section class="product-hero">
    <div class="row g-5 align-items-start">

        <!-- ── Gallery ── -->
        <div class="col-lg-6">
            <div class="product-gallery">
                <img src="/assets/polo.png"
                     class="main-img" alt="Polo Shirt" id="mainImg">
                <div class="thumbs">
                    <img src="/assets/polo.png" class="thumb active" alt="View 1" onclick="switchImg(this)">
                    <img src="/assets/polo.png" class="thumb" alt="View 2" onclick="switchImg(this)">
                    <img src="/assets/polo.png" class="thumb" alt="View 3" onclick="switchImg(this)">
                    <img src="/assets/polo.png" class="thumb" alt="View 4" onclick="switchImg(this)">
                </div>
            </div>
        </div>

        <!-- ── Product info ── -->
        <div class="col-lg-6">
            <div class="product-info">

                <!-- Breadcrumb -->
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item"><a href="men.html">Men</a></li>
                        <li class="breadcrumb-item active">Polo Shirt</li>
                    </ol>
                </nav>

                <!-- Name -->
                <h1 class="product-name">Polo Shirt</h1>

                <!-- Price -->
                <div class="product-price-row">
                    <span class="product-price">€150</span>
                    <span class="product-price-original">€250</span>
                    <span class="product-discount">21% OFF</span>
                </div>

                <!-- Colour -->
                <label class="product-label">Colour</label>
                <div class="color-options">
                    <div class="color-badge active" data-color="#2E3F5D" style="background:#2E3F5D;"></div>
                    <div class="color-badge" data-color="#8b4513" style="background:#8b4513;"></div>
                    <div class="color-badge" data-color="#000000" style="background:#000;"></div>
                    <div class="color-badge" data-color="#ffffff" style="background:#fff; border-color:#ccc;"></div>
                </div>

                <!-- Size -->
                <label class="product-label" style="margin-top: 24px;">Size</label>
                <div class="size-options">
                    <div class="size-badge">XS</div>
                    <div class="size-badge active">S</div>
                    <div class="size-badge">M</div>
                    <div class="size-badge">L</div>
                    <div class="size-badge">XL</div>
                </div>
                <p style="margin-top: 10px; margin-bottom: 0;">
                    <a href="#" class="size-guide-link">Size guide</a>
                </p>

                <!-- Actions -->
                <div class="product-actions">
                    <a href="cart.html" class="add-to-cart-btn">
                        <i class="bi bi-bag"></i> Add to Bag
                    </a>
                    <div class="secondary-actions">
                        <a href="wishlist.html" class="btn-wishlist">
                            <i class="bi bi-heart"></i> Wishlist
                        </a>
                        <button class="btn-share" aria-label="Share">
                            <i class="bi bi-share"></i>
                        </button>
                    </div>
                </div>

                <!-- Stock -->
                <div class="stock-info">
                    <span class="stock-dot"></span>
                    <span>In stock</span>
                    <small>· Delivered in 2–3 days</small>
                </div>

            </div>
        </div>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth-panel.js"></script>
<script>
    // Thumbnail switcher
    function switchImg(thumb) {
        document.getElementById('mainImg').src = thumb.src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    }

    // Size selector
    document.querySelectorAll('.size-badge').forEach(badge => {
        badge.addEventListener('click', () => {
            document.querySelectorAll('.size-badge').forEach(b => b.classList.remove('active'));
            badge.classList.add('active');
        });
    });

    // Colour selector
    document.querySelectorAll('.color-badge').forEach(badge => {
        badge.addEventListener('click', () => {
            document.querySelectorAll('.color-badge').forEach(b => b.classList.remove('active'));
            badge.classList.add('active');
        });
    });
</script>



</body>
